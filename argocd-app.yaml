apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gestion-pods
  namespace: openshift-gitops
spec:
  destination:
    namespace: gestion-pods
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/lyeschaya/gestion-pods.git
    targetRevision: main
    path: .
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
